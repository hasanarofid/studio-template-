<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMKM Template Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .nav { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .hero { position: relative; height: 500px; background: #fce4ec; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 3.5rem; color: #c2185b; }
        .products { padding: 50px 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .product-card { border: 1px solid #eee; padding: 15px; border-radius: 10px; text-align: center; }
        .product-card img { width: 100%; border-radius: 5px; margin-bottom: 10px; }
        .btn-wa { display: block; padding: 10px; background: #25D366; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">Kedai Snack Hasan</div>
    <div class="hero">
        <div>
            <h1>Snack Tradisional<br>Kualitas Premium</h1>
            <p>Fresh setiap hari dari dapur kami.</p>
        </div>
    </div>
    <div class="products">
        <div class="product-card"><div style="height:150px; background:#ddd; margin-bottom:10px;"></div><h3>Keripik Singkong</h3><p>Rp15.000</p><a href="#" class="btn-wa">Pesan WA</a></div>
        <div class="product-card"><div style="height:150px; background:#ddd; margin-bottom:10px;"></div><h3>Kue Brownies</h3><p>Rp50.000</p><a href="#" class="btn-wa">Pesan WA</a></div>
        <div class="product-card"><div style="height:150px; background:#ddd; margin-bottom:10px;"></div><h3>Roti Bakar</h3><p>Rp20.000</p><a href="#" class="btn-wa">Pesan WA</a></div>
        <div class="product-card"><div style="height:150px; background:#ddd; margin-bottom:10px;"></div><h3>Es Kopi Susu</h3><p>Rp12.000</p><a href="#" class="btn-wa">Pesan WA</a></div>
    </div>
</body>
</html>
