<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Template Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: #000; color: #fff; }
        .header { padding: 100px 20px; text-align: center; }
        .header h1 { font-size: 4rem; margin: 0; font-weight: 800; }
        .works { padding: 50px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .work-card { height: 400px; background: #222; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }
        .contact { padding: 100px 20px; text-align: center; }
        .btn { padding: 15px 40px; background: #fff; color: #000; text-decoration: none; border-radius: 100px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <p>Hi, I am a Developer</p>
        <h1>Creating Digital<br>Masterpieces.</h1>
    </div>
    <div class="works">
        <div class="work-card">Project One</div>
        <div class="work-card">Project Two</div>
        <div class="work-card">Project Three</div>
        <div class="work-card">Project Four</div>
    </div>
    <div class="contact">
        <a href="#" class="btn">Let's Talk</a>
    </div>
</body>
</html>
