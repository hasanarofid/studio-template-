<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Template Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; color: #333; }
        .hero { padding: 100px 20px; text-align: center; background: #f9fafb; }
        .hero h1 { font-size: 3rem; margin-bottom: 20px; }
        .section { padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .card { padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .cta { padding: 60px 20px; background: #000; color: #white; text-align: center; }
        .btn { display: inline-block; padding: 15px 30px; background: #4F46E5; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Grow Your Business with Us</h1>
        <p>Premium solutions for modern agencies and startups.</p>
        <br>
        <a href="#" class="btn">Learn More</a>
    </div>
    <div class="section">
        <h2>Our Services</h2>
        <div class="grid">
            <div class="card"><h3>Consultancy</h3><p>Professional advice for your growth.</p></div>
            <div class="card"><h3>Digital Marketing</h3><p>Scale your reach across platforms.</p></div>
            <div class="card"><h3>Branding</h3><p>Build a lasting identity.</p></div>
        </div>
    </div>
</body>
</html>
